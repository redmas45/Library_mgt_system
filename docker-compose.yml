version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-ai-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///./data/library.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
